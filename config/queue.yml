default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: [tbdb_api]
      threads: 1
      processes: 1
      polling_interval: 0.5
    - queues: [default]
      threads: 3
      processes: 1
      polling_interval: 1

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
